<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""/>
</head>
<body>
    <div>
        <h1>Event Danse</h1>
    </div>
    <div id="main">
        <div id="map"></div>
        <div id="event"></div>
    </div>
    <div class="form-container">
        <h2>Créer un événement</h2>
        <form id="event-form" method="post" enctype="multipart/form-data">
            <!-- Photo -->
            <div class="form-group">
                <label for="photo">Sélectionner une photo</label>
                <input type="file" id="photo" name="photo" accept="image/*" required>
            </div>

             <!-- Titre -->
             <div class="form-group">
                <label for="title">Titre de l'événement</label>
                <input type="name" id="title" name="title" placeholder="Nom de l'événement" required>
            </div>

             <!-- Titre -->
             <div class="form-group">
                <label for="organisateur">Organisateur</label>
                <input type="name" id="organizer" name="organizer" placeholder="Nom de l'organisateur" required>
            </div>
            <!-- Ville -->
            <div class="form-group">
                <label for="city">Localisation</label>
                <input type="text" id="city" name="city" placeholder="Lieu de l'event" required>
            </div>

            <!-- Date -->
            <div class="form-group">
                <label for="date">Date de l'événement</label>
                <input type="date" id="date" name="date" required>
            </div>

            <!-- description -->
            <div class="form-group">
                <label for="description">Description de l'événement</label>
                <textarea id="description" name="description" rows="4" placeholder="Entrez une description de l'événement" required></textarea>
            </div>

            <!-- Places disponibles -->
            <div class="form-group">
                <label for="places-disponibles">Places disponibles</label>
                <input type="checkbox" id="places-disponibles" name="places_disponibles">
                <label for="places-disponibles" class="checkbox-label">Vrai (cochez si des places sont disponibles)</label>
            </div>

            <!-- Submit -->
            <button type="submit">Soumettre</button>
        </form>
    </div>
     <!-- Make sure you put this AFTER Leaflet's CSS -->
 <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
 integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
 crossorigin=""></script>
<script src="script.js"></script>
</body>
</html>
